{% extends "base.html" %}

{% block title %}404 Non Trovato — IT Support{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:60vh">
    <div class="col-md-6 text-center animate-fade-in">
        <div style="width:96px; height:96px; background:var(--color-warning-soft); border-radius:30px;
                    display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem;
                    box-shadow:0 8px 32px rgba(245,158,11,.15)">
            <i class="bi bi-question-circle" style="font-size:3.5rem; color:var(--color-warning)"></i>
        </div>
        
        <h1 class="display-4 fw-bold mb-2">404</h1>
        <h4 class="mb-3">Pagina Non Trovata</h4>
        
        <p class="mb-4" style="color:var(--text-secondary); max-width:400px; margin:0 auto">
            La pagina che stai cercando non esiste o è stata rimossa. Verifica l'URL o torna alla home.
        </p>
        
        <a href="{{ url_for('dashboard') }}" class="btn btn-action-primary px-4">
            <i class="bi bi-house-door me-2"></i>Torna alla Dashboard
        </a>
    </div>
</div>
{% endblock %}
